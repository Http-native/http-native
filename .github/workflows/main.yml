name: Benchmark

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      engines:
        description: 'Comma-separated engines to benchmark. Supported by this workflow default run: "http-native,bun"'
        required: false
        default: "http-native,bun"
      scenarios:
        description: 'Comma-separated scenarios: "static,dynamic,opt"'
        required: false
        default: "static,dynamic,opt"
      connections:
        description: "Bombardier concurrency"
        required: false
        default: "200"
      duration:
        description: "Bombardier duration"
        required: false
        default: "10s"
      timeout:
        description: "Bombardier timeout"
        required: false
        default: "2s"
jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure cc linker is available
        shell: bash
        run: |
          set -euo pipefail

          if command -v cc >/dev/null 2>&1; then
            echo "cc already available: $(command -v cc)"
            cc --version | head -n 1 || true
            exit 0
          fi

          mkdir -p "$HOME/.local/bin"

          if command -v gcc >/dev/null 2>&1; then
            cat > "$HOME/.local/bin/cc" <<'EOF'
#!/usr/bin/env bash
exec gcc "$@"
EOF
            chmod +x "$HOME/.local/bin/cc"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          elif command -v clang >/dev/null 2>&1; then
            cat > "$HOME/.local/bin/cc" <<'EOF'
#!/usr/bin/env bash
exec clang "$@"
EOF
            chmod +x "$HOME/.local/bin/cc"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y build-essential
          else
            echo "No cc, gcc, clang, or supported package manager found" >&2
            exit 1
          fi

          if command -v cc >/dev/null 2>&1; then
            echo "cc now available: $(command -v cc)"
            cc --version | head -n 1 || true
          else
            echo "Failed to provision cc" >&2
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install bombardier
        run: |
          go install github.com/codesenberg/bombardier@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run benchmarks (http-native on Bun + selected engines)
        run: |
          bun bench/ci.js \
            --engines="${{ github.event.inputs.engines || 'http-native,bun' }}" \
            --scenarios="${{ github.event.inputs.scenarios || 'static,dynamic,opt' }}" \
            --connections="${{ github.event.inputs.connections || '200' }}" \
            --duration="${{ github.event.inputs.duration || '10s' }}" \
            --timeout="${{ github.event.inputs.timeout || '2s' }}" \
            --http-native-runtime="bun" \
            --output-dir="bench/results/bun"

      - name: Run benchmarks (http-native on Node)
        run: |
          bun bench/ci.js \
            --engines="http-native" \
            --scenarios="${{ github.event.inputs.scenarios || 'static,dynamic,opt' }}" \
            --connections="${{ github.event.inputs.connections || '200' }}" \
            --duration="${{ github.event.inputs.duration || '10s' }}" \
            --timeout="${{ github.event.inputs.timeout || '2s' }}" \
            --http-native-runtime="node" \
            --output-dir="bench/results/node"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            bench/results/bun/results.json
            bench/results/bun/summary.md
            bench/results/node/results.json
            bench/results/node/summary.md
          if-no-files-found: ignore
