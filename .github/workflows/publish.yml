name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.0.7)"
        required: false
        default: ""
      publish_npm:
        description: "Publish @http-native/core to npm"
        required: false
        default: "false"

jobs:
  native-binaries:
    name: native-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            source: target/release/libhttp_native_napi.so
          - os: windows-latest
            platform: win32
            arch: x64
            source: target/release/http_native_napi.dll
          - os: macos-13
            platform: darwin
            arch: x64
            source: target/release/libhttp_native_napi.dylib
          - os: macos-14
            platform: darwin
            arch: arm64
            source: target/release/libhttp_native_napi.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-release-cache
          workspaces: ". -> target"

      - name: Build native module
        run: cargo build --release --locked

      - name: Package native artifact
        shell: bash
        run: |
          mkdir -p dist/native
          cp "${{ matrix.source }}" "dist/native/http-native-${{ matrix.platform }}-${{ matrix.arch }}.node"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: http-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/native/http-native-${{ matrix.platform }}-${{ matrix.arch }}.node
          if-no-files-found: error

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          fi

      - name: Upload release asset
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/native/http-native-${{ matrix.platform }}-${{ matrix.arch }}.node

  publish-npm:
    name: publish-npm
    runs-on: ubuntu-latest
    needs: native-binaries
    if: github.event_name == 'release' || (inputs.publish_npm == 'true' && inputs.tag != '')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          scope: "@http-native"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
